stages:
  download:
    cmd: .venv/bin/python scripts/download_eeg.py
    outs:
      - data/eeg/

  ingest:
    cmd: make ingest
    deps:
      - data/eeg/
      - src/neuro_spark/core.py
      - src/neuro_spark/pipelines/ingestion/
      - conf/base/parameters.yml
    outs:
      - data/parquet/
    metrics:
      - data/metrics/ingestion.json:
          cache: false

  features:
    cmd: make features
    deps:
      - data/parquet/
      - src/neuro_spark/core.py
      - src/neuro_spark/pipelines/features/
      - conf/base/parameters.yml
    outs:
      - data/features/

  train:
    cmd: make train
    deps:
      - data/features/
      - src/neuro_spark/core.py
      - src/neuro_spark/pipelines/training/
      - conf/base/parameters.yml
    outs:
      - data/models/
    metrics:
      - data/metrics/training.json:
          cache: false

  evaluate:
    cmd: make evaluate
    deps:
      - data/features/
      - data/models/
      - src/neuro_spark/pipelines/evaluation/
      - conf/base/parameters.yml
    outs:
      - data/predictions/
    metrics:
      - data/metrics/evaluation.json:
          cache: false

  export:
    cmd: make export
    deps:
      - data/parquet/
      - data/features/
      - data/predictions/
      - src/neuro_spark/pipelines/export_dashboard/
    outs:
      - data/dashboard/
