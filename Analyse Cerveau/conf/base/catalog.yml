# ── Data Catalog ────────────────────────────────────────────────────────────
# Chemins centralisés — inspiré de Kedro sans l'installer.
# Tous les chemins sont relatifs au conteneur Docker (/opt/spark/).

# ---- Phase 1 : Ingestion ----
raw_eeg:           /opt/spark/data/eeg
raw_records:       /opt/spark/data/eeg/RECORDS

# ---- Phase 2 : Conversion (EDF → Parquet) ----
parquet:           /opt/spark/data/parquet

# ---- Phase 3 : Feature Engineering ----
features:          /opt/spark/data/features

# ---- Phase 4 : Entraînement ----
models:            /opt/spark/data/models
predictions:       /opt/spark/data/predictions
metrics:           /opt/spark/data/metrics

# ---- Phase 5 : Dashboard ----
dashboard:         /opt/spark/data/dashboard
dashboard_assets:  ./assets

# ---- Monitoring & Tracking ----
spark_events:      /opt/spark/spark-events
mlflow_runs:       /opt/spark/mlruns
