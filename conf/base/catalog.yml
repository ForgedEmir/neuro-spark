ingestion_stats:
  type: kedro_datasets.json.JSONDataset
  filepath: data/metrics/ingestion.json

# Raw EEG signal partitioned by subject and run
parquet_data:
  type: kedro_datasets.spark.SparkDataset
  filepath: data/parquet/
  file_format: parquet
  load_args:
    mergeSchema: true
  save_args:
    mode: overwrite

# FFT band power features, one row per epoch
features_data:
  type: kedro_datasets.spark.SparkDataset
  filepath: data/features/
  file_format: parquet
  load_args:
    mergeSchema: true
  save_args:
    mode: overwrite

# Model predictions on the test set
predictions_data:
  type: kedro_datasets.spark.SparkDataset
  filepath: data/predictions/
  file_format: parquet
  save_args:
    mode: overwrite

training_metrics:
  type: kedro_datasets.json.JSONDataset
  filepath: data/metrics/training.json

evaluation_metrics:
  type: kedro_datasets.json.JSONDataset
  filepath: data/metrics/evaluation.json

# Dashboard exports (one file per artifact)
dashboard_signal:
  type: kedro_datasets.spark.SparkDataset
  filepath: data/dashboard/signal_sample/
  file_format: parquet
  save_args:
    mode: overwrite

dashboard_features:
  type: kedro_datasets.spark.SparkDataset
  filepath: data/dashboard/features/
  file_format: parquet
  save_args:
    mode: overwrite

dashboard_predictions:
  type: kedro_datasets.spark.SparkDataset
  filepath: data/dashboard/predictions/
  file_format: parquet
  save_args:
    mode: overwrite

# ── Streaming EEG (BCI live) ─────────────────────────────────────────────────
streaming_eeg_metrics:
  type: kedro_datasets.json.JSONDataset
  filepath: data/metrics/streaming_eeg.json
