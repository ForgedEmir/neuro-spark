name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    - name: Lint with ruff
      run: |
        cd "Analyse Cerveau"
        ruff check src/neuro_spark/ src/neuro_spark/pipelines/ dashboard.py scripts/download_eeg.py --ignore E501
    - name: Check YAML validity
      run: |
        pip install pyyaml
        python -c "
import yaml
yaml.safe_load(open('Analyse Cerveau/conf/base/catalog.yml'))
yaml.safe_load(open('Analyse Cerveau/conf/base/parameters.yml'))
print('YAML valid ✓')
        "

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyyaml mne numpy pandas
    - name: Run tests
      run: |
        cd "Analyse Cerveau"
        python -m pytest tests/ -v -x

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Dockerfile
      run: |
        cd "Analyse Cerveau"
        docker build -t neuro-spark:test --target pyspark-runner .
