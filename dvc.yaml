stages:
  # ── Étape 1 : Téléchargement des données ──
  download:
    cmd: python scripts/download_eeg.py
    outs:
      - data/eeg/

  # ── Étape 2 : Conversion EDF → Parquet ──
  convert:
    cmd: python src/neuro_spark/pipelines/ingestion.py
    deps:
      - data/eeg/
      - src/neuro_spark/pipelines/ingestion.py
    outs:
      - data/parquet/

  # ── Étape 3 : Feature Engineering (FFT) ──
  features:
    cmd: python src/neuro_spark/pipelines/features.py
    deps:
      - data/parquet/
      - src/neuro_spark/pipelines/features.py
    params:
      - features.epoch_seconds
      - features.bands
      - features.motor_channels
    outs:
      - data/features/

  # ── Étape 4 : Entraînement RandomForest ──
  train:
    cmd: python src/neuro_spark/pipelines/training.py
    deps:
      - data/features/
      - src/neuro_spark/pipelines/training.py
    params:
      - ml.num_trees
      - ml.max_depth
      - ml.class_weights
      - split
    outs:
      - data/models/
    metrics:
      - metrics.json:
          cache: false

  # ── Étape 5 : Évaluation ──
  evaluate:
    cmd: python src/neuro_spark/pipelines/evaluation.py
    deps:
      - data/models/
      - data/features/
    outs:
      - data/predictions/
    metrics:
      - metrics/evaluation.json:
          cache: false

  # ── Étape 6 : Export Dashboard ──
  export_dashboard:
    cmd: python src/neuro_spark/pipelines/export_dashboard.py
    deps:
      - data/features/
      - data/predictions/
    outs:
      - data/dashboard/
