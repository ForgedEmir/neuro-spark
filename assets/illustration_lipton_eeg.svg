<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#636EFA"/>
      <stop offset="100%" style="stop-color:#00CC96"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="700" letter-spacing="2">DE LA PENSÉE AU SIGNAL — LE PONT ENTRE LIPTON ET L'EEG</text>

  <!-- === LEFT: LIPTON'S MODEL === -->
  <text x="150" y="80" text-anchor="middle" fill="#888" font-size="11" text-transform="uppercase" letter-spacing="1">MODÈLE DE LIPTON</text>

  <!-- Croyance box -->
  <rect x="50" y="100" width="200" height="60" rx="8" fill="#1e1e3a" stroke="#EF553B" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="125" text-anchor="middle" fill="#EF553B" font-size="13" font-weight="700">CROYANCE</text>
  <text x="150" y="145" text-anchor="middle" fill="#999" font-size="10">Perception programmée</text>

  <!-- Arrow down -->
  <line x1="150" y1="160" x2="150" y2="190" stroke="#EF553B" stroke-width="2" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#EF553B"/></marker></defs>

  <!-- Pensée box -->
  <rect x="50" y="195" width="200" height="60" rx="8" fill="#1e1e3a" stroke="#636EFA" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="220" text-anchor="middle" fill="#636EFA" font-size="13" font-weight="700">PENSÉE</text>
  <text x="150" y="240" text-anchor="middle" fill="#999" font-size="10">Énergie de l'esprit</text>

  <!-- Arrow down -->
  <line x1="150" y1="255" x2="150" y2="285" stroke="#636EFA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#636EFA"/></marker></defs>

  <!-- Cerveau box -->
  <rect x="50" y="290" width="200" height="60" rx="8" fill="#1e1e3a" stroke="#00CC96" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="315" text-anchor="middle" fill="#00CC96" font-size="13" font-weight="700">CERVEAU</text>
  <text x="150" y="335" text-anchor="middle" fill="#999" font-size="10">Interface corps-esprit</text>

  <!-- Arrow down -->
  <line x1="150" y1="350" x2="150" y2="380" stroke="#00CC96" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00CC96"/></marker></defs>

  <!-- Cellules box -->
  <rect x="50" y="385" width="200" height="60" rx="8" fill="#1e1e3a" stroke="#FFA500" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="410" text-anchor="middle" fill="#FFA500" font-size="13" font-weight="700">CELLULES</text>
  <text x="150" y="430" text-anchor="middle" fill="#999" font-size="10">Réponse biologique</text>

  <!-- === CENTER: BRIDGE === -->
  <rect x="300" y="130" width="300" height="240" rx="12" fill="none" stroke="url(#glow)" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="450" y="155" text-anchor="middle" fill="#636EFA" font-size="11" font-weight="600" letter-spacing="1">CE QUE NOTRE PROJET MESURE</text>

  <!-- EEG waveform -->
  <path d="M330,220 Q360,180 390,220 Q420,260 450,220 Q480,180 510,220 Q540,260 570,220" stroke="#636EFA" stroke-width="2.5" fill="none" opacity="0.8"/>
  <text x="450" y="280" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="600">Signal EEG brut</text>
  <text x="450" y="298" text-anchor="middle" fill="#888" font-size="10">64 canaux × 160 Hz × 66 sujets</text>

  <!-- FFT arrow -->
  <text x="450" y="330" text-anchor="middle" fill="#00CC96" font-size="11">↓ FFT spectrale ↓</text>

  <!-- Band boxes -->
  <rect x="330" y="345" width="70" height="35" rx="6" fill="#2a1a3e" stroke="#EF553B" stroke-width="1.5"/>
  <text x="365" y="367" text-anchor="middle" fill="#EF553B" font-size="11" font-weight="700">α 8-13Hz</text>
  <rect x="415" y="345" width="70" height="35" rx="6" fill="#1a2a3e" stroke="#636EFA" stroke-width="1.5"/>
  <text x="450" y="367" text-anchor="middle" fill="#636EFA" font-size="11" font-weight="700">β 13-30Hz</text>
  <rect x="500" y="345" width="70" height="35" rx="6" fill="#1a3e2a" stroke="#00CC96" stroke-width="1.5"/>
  <text x="535" y="367" text-anchor="middle" fill="#00CC96" font-size="11" font-weight="700">γ 30-80Hz</text>

  <text x="450" y="410" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="600">ERD mesurable</text>
  <text x="450" y="428" text-anchor="middle" fill="#888" font-size="10">Pensée → Signal réel</text>

  <!-- === RIGHT: ERD EXPLANATION === -->
  <text x="750" y="80" text-anchor="middle" fill="#888" font-size="11" text-transform="uppercase" letter-spacing="1">PHÉNOMÈNE ERD</text>

  <!-- Brain outline -->
  <ellipse cx="750" cy="200" rx="120" ry="100" fill="none" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="750" cy="200" rx="115" ry="95" fill="#0f0f1a"/>

  <!-- C3 marker -->
  <circle cx="680" cy="180" r="25" fill="#EF553B" opacity="0.3"/>
  <circle cx="680" cy="180" r="8" fill="#EF553B"/>
  <text x="680" y="185" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">C3</text>
  <text x="650" y="215" fill="#EF553B" font-size="9">← Gauche</text>

  <!-- Cz marker -->
  <circle cx="750" cy="160" r="25" fill="#636EFA" opacity="0.3"/>
  <circle cx="750" cy="160" r="8" fill="#636EFA"/>
  <text x="750" y="165" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Cz</text>

  <!-- C4 marker -->
  <circle cx="820" cy="180" r="25" fill="#00CC96" opacity="0.3"/>
  <circle cx="820" cy="180" r="8" fill="#00CC96"/>
  <text x="820" y="185" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">C4</text>
  <text x="830" y="215" fill="#00CC96" font-size="9">Droite →</text>

  <!-- Nez -->
  <path d="M735,105 L750,85 L765,105" stroke="#555" stroke-width="1.5" fill="none"/>

  <!-- Imagination label -->
  <text x="750" y="260" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">Imaginer main droite</text>
  <text x="750" y="278" text-anchor="middle" fill="#EF553B" font-size="10">↓ Alpha diminue sur C3 ↓</text>

  <!-- Before/After -->
  <rect x="660" y="300" width="80" height="50" rx="6" fill="#1e1e3a" stroke="#555" stroke-width="1"/>
  <text x="700" y="320" text-anchor="middle" fill="#888" font-size="9">AVANT</text>
  <text x="700" y="340" text-anchor="middle" fill="#636EFA" font-size="13" font-weight="700">█████</text>

  <rect x="760" y="300" width="80" height="50" rx="6" fill="#1e1e3a" stroke="#555" stroke-width="1"/>
  <text x="800" y="320" text-anchor="middle" fill="#888" font-size="9">PENDANT</text>
  <text x="800" y="340" text-anchor="middle" fill="#EF553B" font-size="13" font-weight="700">██░░░</text>

  <!-- Conclusion -->
  <rect x="620" y="380" width="260" height="70" rx="8" fill="#1a1a2e" stroke="url(#glow)" stroke-width="1.5"/>
  <text x="750" y="405" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">Pas de mouvement réel.</text>
  <text x="750" y="423" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="600">La pensée seule change le signal.</text>
  <text x="750" y="441" text-anchor="middle" fill="#00CC96" font-size="10" font-style="italic">→ Preuve mesurable de Lipton</text>

  <!-- === Connecting arrows === -->
  <path d="M250,225 C280,225 280,225 300,225" stroke="#636EFA" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M570,362 C600,362 620,200 650,200" stroke="#00CC96" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- Footer -->
  <text x="450" y="485" text-anchor="middle" fill="#555" font-size="9">UE28 Big Data — HELMo 2025-2026 — NeuroSpark: Distributed EEG Motor Imagery Decoding</text>
</svg>
