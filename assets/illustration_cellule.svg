<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="350" fill="url(#bg3)" rx="12"/>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="700" letter-spacing="1">LA CELLULE COMME RÉCEPTEUR — MODÈLE DE LIPTON</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="10">La membrane cellulaire perçoit l'environnement et ajuste le comportement</text>

  <!-- ENVIRONMENT (left) -->
  <rect x="20" y="70" width="180" height="250" rx="10" fill="#1e1e3a" stroke="#555" stroke-width="1"/>
  <text x="110" y="95" text-anchor="middle" fill="#888" font-size="11" font-weight="600" letter-spacing="1">ENVIRONNEMENT</text>

  <!-- Stimuli -->
  <rect x="40" y="115" width="140" height="40" rx="6" fill="#1a3e2a" stroke="#00CC96" stroke-width="1.5"/>
  <text x="110" y="135" text-anchor="middle" fill="#00CC96" font-size="10" font-weight="600">NUTRIMENTS</text>
  <text x="110" y="148" text-anchor="middle" fill="#888" font-size="9">Signal favorable</text>

  <rect x="40" y="170" width="140" height="40" rx="6" fill="#3e1a1a" stroke="#EF553B" stroke-width="1.5"/>
  <text x="110" y="190" text-anchor="middle" fill="#EF553B" font-size="10" font-weight="600">TOXINES</text>
  <text x="110" y="203" text-anchor="middle" fill="#888" font-size="9">Signal menaçant</text>

  <rect x="40" y="225" width="140" height="40" rx="6" fill="#1a1a3e" stroke="#636EFA" stroke-width="1.5"/>
  <text x="110" y="245" text-anchor="middle" fill="#636EFA" font-size="10" font-weight="600">HORMONES</text>
  <text x="110" y="258" text-anchor="middle" fill="#888" font-size="9">Signal du cerveau</text>

  <!-- Arrow to membrane -->
  <line x1="200" y1="200" x2="260" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrG)"/>
  <defs><marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#555"/></marker></defs>

  <!-- MEMBRANE (center) -->
  <rect x="265" y="70" width="270" height="250" rx="10" fill="#1e1e3a" stroke="#FFA500" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" fill="#FFA500" font-size="11" font-weight="600" letter-spacing="1">MEMBRANE CELLULAIRE</text>
  <text x="400" y="112" text-anchor="middle" fill="#888" font-size="9">« Cerveau » de la cellule</text>

  <!-- Receptors -->
  <rect x="285" y="130" width="100" height="50" rx="6" fill="#0f0f1a" stroke="#00CC96" stroke-width="1.5"/>
  <text x="335" y="150" text-anchor="middle" fill="#00CC96" font-size="9" font-weight="600">RÉCEPTEUR</text>
  <text x="335" y="165" text-anchor="middle" fill="#00CC96" font-size="9">H2 / β-adrénergique</text>
  <text x="335" y="178" text-anchor="middle" fill="#888" font-size="8">→ CROISSANCE</text>

  <rect x="415" y="130" width="100" height="50" rx="6" fill="#0f0f1a" stroke="#EF553B" stroke-width="1.5"/>
  <text x="465" y="150" text-anchor="middle" fill="#EF553B" font-size="9" font-weight="600">RÉCEPTEUR</text>
  <text x="465" y="165" text-anchor="middle" fill="#EF553B" font-size="9">H1 / α-adrénergique</text>
  <text x="465" y="178" text-anchor="middle" fill="#888" font-size="8">→ DÉFENSE</text>

  <!-- Perception label -->
  <rect x="310" y="200" width="180" height="35" rx="6" fill="#2a2a3e"/>
  <text x="400" y="222" text-anchor="middle" fill="#FFA500" font-size="10" font-weight="600">PERCEPTION</text>

  <!-- Same signal, different response -->
  <text x="400" y="255" text-anchor="middle" fill="#e0e0e0" font-size="10">Même signal (adrénaline)</text>
  <text x="400" y="270" text-anchor="middle" fill="#e0e0e0" font-size="10">→ réponse différente selon le récepteur</text>
  <text x="400" y="288" text-anchor="middle" fill="#FFA500" font-size="10" font-style="italic">La perception contrôle la biologie</text>

  <!-- Arrow to response -->
  <line x1="535" y1="200" x2="570" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- RESPONSE (right) -->
  <rect x="575" y="70" width="205" height="250" rx="10" fill="#1e1e3a" stroke="#555" stroke-width="1"/>
  <text x="678" y="95" text-anchor="middle" fill="#888" font-size="11" font-weight="600" letter-spacing="1">RÉPONSE</text>

  <!-- Growth response -->
  <rect x="595" y="115" width="165" height="55" rx="6" fill="#1a3e2a" stroke="#00CC96" stroke-width="1.5"/>
  <text x="678" y="135" text-anchor="middle" fill="#00CC96" font-size="10" font-weight="700">CROISSANCE</text>
  <text x="678" y="150" text-anchor="middle" fill="#888" font-size="9">Nutriments → approche</text>
  <text x="678" y="163" text-anchor="middle" fill="#888" font-size="9">H2 → ouverture, reproduction</text>

  <!-- Defense response -->
  <rect x="595" y="185" width="165" height="55" rx="6" fill="#3e1a1a" stroke="#EF553B" stroke-width="1.5"/>
  <text x="678" y="205" text-anchor="middle" fill="#EF553B" font-size="10" font-weight="700">DÉFENSE</text>
  <text x="678" y="220" text-anchor="middle" fill="#888" font-size="9">Toxines → fuite</text>
  <text x="678" y="233" text-anchor="middle" fill="#888" font-size="9">H1 → protection, contraction</text>

  <!-- Key insight -->
  <rect x="595" y="255" width="165" height="50" rx="6" fill="#2a2a3e" stroke="#636EFA" stroke-width="1"/>
  <text x="678" y="273" text-anchor="middle" fill="#636EFA" font-size="9" font-weight="600">CROISSANCE ET DÉFENSE</text>
  <text x="678" y="288" text-anchor="middle" fill="#888" font-size="8">Ne peuvent pas fonctionner</text>
  <text x="678" y="299" text-anchor="middle" fill="#888" font-size="8">simultanément de manière optimale</text>

  <!-- Footer connection to EEG -->
  <text x="400" y="340" text-anchor="middle" fill="#555" font-size="9">Le cerveau envoie des signaux (hormones, adrénaline) → la cellule perçoit → le corps répond. L'EEG capte ces signaux cérébraux.</text>
</svg>
